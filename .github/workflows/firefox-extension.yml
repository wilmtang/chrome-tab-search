name: Firefox Extension

on:
  pull_request:
    branches: [main]
    paths:
      - manifest.json
      - popup.html
      - popup.css
      - popup.js
      - options.html
      - options.js
      - icons/**
      - amo-metadata.json
      - web-ext-config.mjs
      - package.json
      - package-lock.json
      - .github/workflows/firefox-extension.yml
  push:
    branches: [main]
    tags:
      - firefox-extension-v*
    paths:
      - manifest.json
      - popup.html
      - popup.css
      - popup.js
      - options.html
      - options.js
      - icons/**
      - amo-metadata.json
      - web-ext-config.mjs
      - package.json
      - package-lock.json
      - .github/workflows/firefox-extension.yml
  workflow_dispatch:
    inputs:
      publish:
        description: Sign and upload this version to addons.mozilla.org
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  validate:
    name: Validate Firefox package
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint Firefox extension
        run: npm run lint

      - name: Build Firefox extension artifact
        run: npm run build

      - name: Upload unsigned artifact
        uses: actions/upload-artifact@v7
        with:
          name: firefox-extension-unsigned
          path: web-ext-artifacts/*.zip
          if-no-files-found: error

  auto-tag:
    name: Create Firefox release tag
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Create tag when manifest version changes
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "No previous commit is available for this push; skipping auto-tag."
            exit 0
          fi

          if ! git cat-file -e "$BEFORE^{commit}" 2>/dev/null; then
            echo "Previous commit $BEFORE is not available; skipping auto-tag."
            exit 0
          fi

          OLD_VERSION="$(git show "$BEFORE:manifest.json" | node -e "const fs = require('fs'); console.log(JSON.parse(fs.readFileSync(0, 'utf8')).version)")"
          NEW_VERSION="$(node -p "require('./manifest.json').version")"

          if [ "$OLD_VERSION" = "$NEW_VERSION" ]; then
            echo "manifest.json version did not change ($NEW_VERSION); skipping auto-tag."
            exit 0
          fi

          TAG="firefox-extension-v$NEW_VERSION"

          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null || git ls-remote --exit-code --tags origin "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists; skipping auto-tag."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" "$AFTER" -m "$TAG"
          git push origin "$TAG"

  publish:
    name: Upload to Firefox Add-ons
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: startsWith(github.ref, 'refs/tags/firefox-extension-v') || github.event.inputs.publish == 'true'
    environment: firefox-addons
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches extension version
        if: startsWith(github.ref, 'refs/tags/firefox-extension-v')
        run: |
          VERSION="$(node -p "require('./manifest.json').version")"
          TAG="${GITHUB_REF_NAME#firefox-extension-v}"
          test "$VERSION" = "$TAG" || {
            echo "Tag firefox-extension-v$TAG does not match manifest.json version $VERSION"
            exit 1
          }

      - name: Sign and upload listed Firefox extension
        env:
          WEB_EXT_API_KEY: ${{ secrets.AMO_JWT_ISSUER }}
          WEB_EXT_API_SECRET: ${{ secrets.AMO_JWT_SECRET }}
        run: npm run publish:firefox
